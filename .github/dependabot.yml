version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    groups:
      rust-dependencies:
        patterns: ["*"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # `stable` follows current Rust, while `1.88.0` is the deliberate MSRV.
    ignore:
      - dependency-name: dtolnay/rust-toolchain
