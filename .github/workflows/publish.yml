name: Publish to crates.io

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: crates-io-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"
  RUSTDOCFLAGS: "-Dwarnings"

jobs:
  publish:
    name: Publish ${{ github.ref_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          components: clippy,rustfmt

      - name: Validate tag and release commit
        id: release
        shell: bash
        run: |
          set -euo pipefail
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "playhound") | .version')"
          expected_tag="v${version}"
          if [[ "${GITHUB_REF_NAME}" != "${expected_tag}" ]]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${version}"
            exit 1
          fi
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "::error::Release tag must point to a commit reachable from main"
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint all targets and features
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Test all targets and features
        run: cargo test --workspace --all-features --locked

      - name: Test the minimal library feature set
        run: cargo test --no-default-features --lib --locked

      - name: Check feature boundaries
        run: cargo check --no-default-features --locked

      - name: Check the blocking feature
        run: cargo check --no-default-features --features blocking --locked

      - name: Build documentation
        run: cargo doc --all-features --no-deps --locked

      - name: Verify Rust 1.85 compatibility
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install 1.85.0 --profile minimal
          cargo +1.85.0 check --all-features --locked

      - name: Build and verify the crate package
        run: cargo package --all-features --locked

      - name: Inspect package contents
        run: cargo package --all-features --locked --list

      - name: Check whether this exact package is already published
        id: registry
        env:
          VERSION: ${{ steps.release.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          response="${RUNNER_TEMP}/crates-io-version.json"
          status="$(curl --silent --show-error \
            --user-agent "playhound-release/${GITHUB_RUN_ID}" \
            --output "${response}" \
            --write-out "%{http_code}" \
            "https://crates.io/api/v1/crates/playhound/${VERSION}")"
          case "${status}" in
            200)
              registry_checksum="$(jq -r '.version.checksum' "${response}")"
              package_checksum="$(sha256sum "target/package/playhound-${VERSION}.crate" | cut -d ' ' -f 1)"
              if [[ "${registry_checksum}" != "${package_checksum}" ]]; then
                echo "::error::Version ${VERSION} exists on crates.io with different contents"
                exit 1
              fi
              echo "Version ${VERSION} is already published with the same checksum."
              echo "exists=true" >> "${GITHUB_OUTPUT}"
              ;;
            404)
              echo "exists=false" >> "${GITHUB_OUTPUT}"
              ;;
            *)
              cat "${response}"
              echo "::error::crates.io returned HTTP ${status}"
              exit 1
              ;;
          esac

      - name: Authenticate to crates.io
        if: steps.registry.outputs.exists != 'true'
        id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - name: Publish to crates.io
        if: steps.registry.outputs.exists != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --all-features --locked
